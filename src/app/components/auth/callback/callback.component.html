<div class="auth-shell">
  <div class="auth-card" role="status" aria-live="polite">
    <div class="auth-brand" aria-hidden="true">
      <img src="assets/img/xomware-icon-transparent-background.png" alt="" />
      <span>XOMWARE</span>
    </div>

    <ng-container *ngIf="!errored">
      <h1 class="auth-title">Signing you in…</h1>
      <p class="auth-subtitle">Hang tight while we finish setting things up.</p>
      <div class="callback-spinner" aria-hidden="true">
        <span class="spinner"></span>
      </div>
    </ng-container>

    <ng-container *ngIf="errored">
      <h1 class="auth-title">That took longer than expected</h1>
      <p class="auth-subtitle">
        Sign-in didn't complete. Please try again from the sign-in page.
      </p>
      <a routerLink="/auth/sign-in" class="auth-btn" style="text-decoration: none;">
        Back to sign in
      </a>
    </ng-container>
  </div>
</div>
