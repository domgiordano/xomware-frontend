<div class="auth-shell">
  <div class="auth-card">
    <a routerLink="/" class="auth-brand" aria-label="Xomware home">
      <img src="assets/img/xomware-icon-transparent-background.png" alt="" />
      <span>XOMWARE</span>
    </a>

    <h1 class="auth-title">Verify your email</h1>
    <p class="auth-subtitle">
      We sent a 6-digit code to
      <strong *ngIf="email">{{ email }}</strong>
      <span *ngIf="!email">your email</span>.
    </p>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="auth-form" novalidate>
      <div class="auth-field">
        <label for="verify-code" class="auth-label">Verification code</label>
        <input
          id="verify-code"
          type="text"
          formControlName="code"
          class="auth-input"
          [class.invalid]="fieldInvalid('code')"
          inputmode="numeric"
          autocomplete="one-time-code"
          maxlength="6"
          placeholder="123456"
          [attr.aria-invalid]="fieldInvalid('code') || null"
        />
        <span *ngIf="fieldInvalid('code')" class="auth-error-field">
          Enter the 6-digit code from your email.
        </span>
      </div>

      <p *ngIf="errorMessage" class="auth-error" role="alert">{{ errorMessage }}</p>
      <p *ngIf="infoMessage" class="auth-hint" role="status">{{ infoMessage }}</p>

      <button type="submit" class="auth-btn" [disabled]="loading || !email">
        <span *ngIf="!loading">Verify</span>
        <span *ngIf="loading" class="spinner" aria-label="Verifying"></span>
      </button>

      <button type="button" class="auth-btn-ghost" (click)="onResend()" [disabled]="resending || !email">
        <span *ngIf="!resending">Resend code</span>
        <span *ngIf="resending" class="spinner" aria-label="Resending"></span>
      </button>
    </form>

    <a routerLink="/auth/sign-up" class="auth-back">&larr; Back to sign up</a>
  </div>
</div>
