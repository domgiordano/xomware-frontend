name: Deploy Xomware Frontend

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
    types:
      - closed
  workflow_dispatch:

jobs:
  build-and-deploy:
    # Run on push, workflow_dispatch, or merged PRs (not just closed)
    if: github.event_name != 'pull_request' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Pull Cognito config from SSM (Terraform-managed values)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-1
        run: |
          {
            echo "COGNITO_USER_POOL_ID=$(aws ssm get-parameter --name /xomware/shared/cognito/user-pool-id --query Parameter.Value --output text)"
            echo "COGNITO_CLIENT_ID=$(aws ssm get-parameter --name /xomware/shared/cognito/clients/xomware-com-id --query Parameter.Value --output text)"
            echo "COGNITO_DOMAIN=$(aws ssm get-parameter --name /xomware/shared/cognito/hosted-ui-domain --query Parameter.Value --output text)"
            echo "FILE_EDITOR_API_URL=$(aws ssm get-parameter --name /xomware/shared/file-editor-api/url --query Parameter.Value --output text)"
            echo "USERS_API_URL=$(aws ssm get-parameter --name /xomware/shared/users-api/url --query Parameter.Value --output text)"
            echo "AVATARS_CDN_URL=$(aws ssm get-parameter --name /xomware/shared/avatars/cdn-url --query Parameter.Value --output text)"
          } >> "$GITHUB_ENV"

      - name: Inject environment variables into Angular
        env:
          GA4_MEASUREMENT_ID: ${{ secrets.GA4_MEASUREMENT_ID }}
        run: |
          # Cognito values come from SSM (set via $GITHUB_ENV in the prior step).
          # GA4 is optional and stays as a repo secret since the user creates the
          # GA4 property out-of-band — when blank the analytics service no-ops.
          sed -i "s|cognitoUserPoolId: ''|cognitoUserPoolId: '${COGNITO_USER_POOL_ID}'|g" src/environments/environment.ts
          sed -i "s|cognitoClientId: ''|cognitoClientId: '${COGNITO_CLIENT_ID}'|g" src/environments/environment.ts
          sed -i "s|cognitoDomain: 'xomware-auth.auth.us-east-1.amazoncognito.com'|cognitoDomain: '${COGNITO_DOMAIN}'|g" src/environments/environment.ts
          sed -i "s|ga4MeasurementId: ''|ga4MeasurementId: '${GA4_MEASUREMENT_ID}'|g" src/environments/environment.ts
          # File-editor + users-api + avatars CDN URLs come from SSM (set above).
          # Defaults in environment.ts already point at the prod hosts so a build
          # works if SSM is empty during a transitional deploy.
          if [ -n "${FILE_EDITOR_API_URL}" ]; then
            sed -i "s|apiBaseUrl: 'https://editor-api.xomware.com'|apiBaseUrl: '${FILE_EDITOR_API_URL}'|g" src/environments/environment.ts
          fi
          if [ -n "${USERS_API_URL}" ]; then
            sed -i "s|usersApiUrl: 'https://api.xomware.com'|usersApiUrl: '${USERS_API_URL}'|g" src/environments/environment.ts
          fi
          if [ -n "${AVATARS_CDN_URL}" ]; then
            sed -i "s|avatarsCdnUrl: ''|avatarsCdnUrl: '${AVATARS_CDN_URL}'|g" src/environments/environment.ts
          fi

      - name: Build
        run: npm run build:prod

      - name: Deploy hashed bundles to S3 (1 year cache)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-1
        run: |
          # Upload everything EXCEPT index.html with long cache (hashed filenames)
          aws s3 sync ./dist/xomware s3://xomware.com --delete \
            --exclude "index.html" \
            --cache-control "public, max-age=31536000, immutable"

      - name: Deploy index.html (no-cache)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-1
        run: |
          aws s3 cp ./dist/xomware/index.html s3://xomware.com/index.html \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html"

      - name: Invalidate CloudFront and wait
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-1
        run: |
          DISTRIBUTION_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Aliases.Items[?@ == 'xomware.com']].Id" \
            --output text)

          if [ -z "$DISTRIBUTION_ID" ]; then
            echo "::error::No CloudFront distribution found for xomware.com"
            exit 1
          fi

          echo "Invalidating CloudFront distribution: $DISTRIBUTION_ID"
          INVALIDATION_ID=$(aws cloudfront create-invalidation \
            --distribution-id "$DISTRIBUTION_ID" \
            --paths "/" "/index.html" "/status/board" "/command" \
            --query 'Invalidation.Id' --output text)

          echo "Invalidation ID: $INVALIDATION_ID — waiting for completion..."
          # Poll until invalidation completes (timeout after 5 minutes)
          TIMEOUT=300
          ELAPSED=0
          while [ $ELAPSED -lt $TIMEOUT ]; do
            STATUS=$(aws cloudfront get-invalidation \
              --distribution-id "$DISTRIBUTION_ID" \
              --id "$INVALIDATION_ID" \
              --query 'Invalidation.Status' --output text)
            echo "  Status: $STATUS (${ELAPSED}s)"
            if [ "$STATUS" = "Completed" ]; then
              echo "✅ CloudFront invalidation completed"
              break
            fi
            sleep 10
            ELAPSED=$((ELAPSED + 10))
          done

          if [ "$STATUS" != "Completed" ]; then
            echo "::warning::Invalidation did not complete within ${TIMEOUT}s (status: $STATUS)"
          fi

      - name: Deployment Summary
        if: success()
        run: |
          echo "## ✅ Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**S3 Bucket:** s3://xomware.com" >> $GITHUB_STEP_SUMMARY
          echo "**Cache Strategy:**" >> $GITHUB_STEP_SUMMARY
          echo "- \`index.html\`: no-cache (always fresh)" >> $GITHUB_STEP_SUMMARY
          echo "- Bundles (JS/CSS): 1 year immutable (hash-busted)" >> $GITHUB_STEP_SUMMARY
          echo "**CloudFront:** Invalidated \`/\`, \`/index.html\`, \`/status/board\`, \`/command\`" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** https://xomware.com" >> $GITHUB_STEP_SUMMARY
