<div class="auth-shell">
  <div class="auth-card">
    <a routerLink="/" class="auth-brand" aria-label="Xomware home">
      <img src="assets/img/xomware-icon-transparent-background.png" alt="" />
      <span>XOMWARE</span>
    </a>

    <h1 class="auth-title">Create your account</h1>
    <p class="auth-subtitle">One account, every Xomware app.</p>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="auth-form" novalidate>
      <div class="auth-field">
        <label for="signup-username" class="auth-label">Username</label>
        <input
          id="signup-username"
          type="text"
          formControlName="preferredUsername"
          class="auth-input"
          [class.invalid]="fieldInvalid('preferredUsername')"
          autocomplete="username"
          inputmode="text"
          spellcheck="false"
          placeholder="dom_g"
          [attr.aria-invalid]="fieldInvalid('preferredUsername') || null"
          [attr.aria-describedby]="'signup-username-hint'"
        />
        <span id="signup-username-hint" class="auth-hint">
          3–20 chars · lowercase letters, numbers, underscores.
        </span>
        <span *ngIf="usernameError() as ue" class="auth-error-field">{{ ue }}</span>
      </div>

      <div class="auth-field">
        <label for="signup-email" class="auth-label">Email</label>
        <input
          id="signup-email"
          type="email"
          formControlName="email"
          class="auth-input"
          [class.invalid]="fieldInvalid('email')"
          autocomplete="email"
          inputmode="email"
          placeholder="you@example.com"
          [attr.aria-invalid]="fieldInvalid('email') || null"
        />
        <span *ngIf="fieldInvalid('email')" class="auth-error-field">
          Enter a valid email address.
        </span>
      </div>

      <div class="auth-field">
        <label for="signup-password" class="auth-label">Password</label>
        <input
          id="signup-password"
          type="password"
          formControlName="password"
          class="auth-input"
          [class.invalid]="fieldInvalid('password')"
          autocomplete="new-password"
          placeholder="At least 8 characters"
          [attr.aria-invalid]="fieldInvalid('password') || null"
        />
        <span *ngIf="fieldInvalid('password')" class="auth-error-field">
          Password must be at least 8 characters.
        </span>
      </div>

      <p *ngIf="errorMessage" class="auth-error" role="alert">{{ errorMessage }}</p>

      <button type="submit" class="auth-btn" [disabled]="loading">
        <span *ngIf="!loading">Create account</span>
        <span *ngIf="loading" class="spinner" aria-label="Creating account"></span>
      </button>
    </form>

    <p class="auth-footer">
      Already have an account?
      <a routerLink="/auth/sign-in">Sign in</a>
    </p>
  </div>
</div>
