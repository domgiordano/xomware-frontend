      <ellipse cx="-5" cy="-6" rx="7" ry="4" fill="url(#blobShine)" />
      <g class="b-eyes">
        <circle cx="-6" cy="-3" r="4.5" fill="white" />
        <circle cx="-4.5" cy="-3" r="2" fill="#111" class="b-pupil" />
        <circle cx="6" cy="-3" r="4.5" fill="white" />
        <circle cx="7.5" cy="-3" r="2" fill="#111" class="b-pupil" />
      </g>
      <path d="M-3,5 Q0,7 3,5" stroke="#111" stroke-width="1.2" fill="none" stroke-linecap="round" class="b-mouth" />
    </g>
