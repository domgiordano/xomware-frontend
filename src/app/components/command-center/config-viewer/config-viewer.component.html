<div class="config-viewer">
  <div class="config-header">
    <h2>⚙️ Configuration Files</h2>
    <p class="config-subtitle">Jarvis agent settings and workspace rules</p>
  </div>

  <div class="config-grid">
    <div
      *ngFor="let file of files"
      class="config-card"
      [class.expanded]="file.expanded"
      (click)="toggleFile(file)"
    >
      <div class="config-card-header">
        <span class="file-icon">{{ file.icon }}</span>
        <div class="file-info">
          <span class="file-name">{{ file.name }}</span>
          <span class="file-desc">{{ file.description }}</span>
        </div>
        <span class="expand-icon" [class.rotated]="file.expanded">▶</span>
      </div>

      <div *ngIf="file.expanded" class="config-card-body">
        <pre class="file-content">{{ file.content }}</pre>
      </div>
    </div>
  </div>
</div>
