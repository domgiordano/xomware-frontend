<div class="activity-log">
  <div class="log-header">
    <h2>📊 Activity Log</h2>
    <div class="log-filters">
      <button
        *ngFor="let f of ['all', 'task', 'lesson', 'error', 'info']"
        class="filter-btn"
        [class.active]="filter === f"
        (click)="setFilter(f)"
      >
        {{ f }}
      </button>
    </div>
  </div>

  <div class="log-timeline">
    <div *ngFor="let entry of filteredEntries" class="log-entry" [attr.data-type]="entry.type">
      <div class="entry-dot"></div>
      <div class="entry-content">
        <div class="entry-header">
          <span class="entry-icon">{{ entry.icon }}</span>
          <span class="entry-title">{{ entry.title }}</span>
          <span class="entry-time">{{ entry.timestamp }}</span>
        </div>
        <p *ngIf="entry.detail" class="entry-detail">{{ entry.detail }}</p>
        <span class="entry-type-badge">{{ entry.type }}</span>
      </div>
    </div>
  </div>
</div>
