<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <defs>
    <linearGradient id="xomfit-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a2e1a"/>
      <stop offset="100%" stop-color="#0a140a"/>
    </linearGradient>
    <linearGradient id="xomfit-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34C759"/>
      <stop offset="100%" stop-color="#22a344"/>
    </linearGradient>
  </defs>

  <!-- Background rounded rect -->
  <rect width="96" height="96" rx="20" fill="url(#xomfit-bg)"/>

  <!-- Dumbbell barbell (horizontal bar) -->
  <rect x="28" y="44" width="40" height="8" rx="4" fill="url(#xomfit-green)"/>

  <!-- Left weight plates -->
  <rect x="20" y="36" width="12" height="24" rx="5" fill="url(#xomfit-green)" opacity="0.9"/>
  <rect x="14" y="39" width="8" height="18" rx="4" fill="url(#xomfit-green)" opacity="0.75"/>

  <!-- Right weight plates -->
  <rect x="64" y="36" width="12" height="24" rx="5" fill="url(#xomfit-green)" opacity="0.9"/>
  <rect x="74" y="39" width="8" height="18" rx="4" fill="url(#xomfit-green)" opacity="0.75"/>

  <!-- Lightning bolt overlay (center) -->
  <path d="M50 18 L42 50 L49 50 L46 78 L56 42 L49 42 Z"
        fill="#34C759" opacity="0.25" transform="translate(-2, 0)"/>

  <!-- Subtle green glow ring -->
  <rect width="96" height="96" rx="20" fill="none" stroke="#34C759" stroke-width="1.5" opacity="0.2"/>
</svg>
