<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <defs>
    <linearGradient id="appetite-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a0e0e"/>
      <stop offset="100%" stop-color="#140707"/>
    </linearGradient>
    <linearGradient id="appetite-coral" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#c83a3a"/>
    </linearGradient>
  </defs>

  <!-- Background rounded rect -->
  <rect width="96" height="96" rx="20" fill="url(#appetite-bg)"/>

  <!-- Crossed knife + fork forming an X (behind, low opacity) -->
  <g opacity="0.25" stroke="#ff6b6b" stroke-width="3" stroke-linecap="round">
    <line x1="22" y1="22" x2="74" y2="74"/>
    <line x1="74" y1="22" x2="22" y2="74"/>
    <!-- Fork tines -->
    <line x1="20" y1="20" x2="20" y2="14" stroke-width="2"/>
    <line x1="24" y1="20" x2="24" y2="14" stroke-width="2"/>
  </g>

  <!-- Chef hat — three puffs -->
  <g fill="url(#appetite-coral)">
    <circle cx="32" cy="36" r="13" opacity="0.95"/>
    <circle cx="48" cy="30" r="15" opacity="0.95"/>
    <circle cx="64" cy="36" r="13" opacity="0.95"/>
  </g>

  <!-- Chef hat band -->
  <rect x="24" y="50" width="48" height="20" rx="3" fill="url(#appetite-coral)"/>

  <!-- Hat band detail line -->
  <line x1="28" y1="60" x2="68" y2="60" stroke="#2a0e0e" stroke-width="1" opacity="0.4"/>

  <!-- Subtle coral glow ring -->
  <rect width="96" height="96" rx="20" fill="none" stroke="#ff6b6b" stroke-width="1.5" opacity="0.2"/>
</svg>
