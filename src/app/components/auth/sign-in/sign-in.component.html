<div class="auth-shell">
  <div class="auth-card">
    <a routerLink="/" class="auth-brand" aria-label="Xomware home">
      <img src="assets/img/xomware-icon-transparent-background.png" alt="" />
      <span>XOMWARE</span>
    </a>

    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-subtitle">Sign in to your Xomware account.</p>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="auth-form" novalidate>
      <div class="auth-field">
        <label for="signin-email" class="auth-label">Email</label>
        <input
          id="signin-email"
          type="email"
          formControlName="email"
          class="auth-input"
          [class.invalid]="fieldInvalid('email')"
          autocomplete="email"
          inputmode="email"
          placeholder="you@example.com"
          [attr.aria-invalid]="fieldInvalid('email') || null"
          [attr.aria-describedby]="fieldInvalid('email') ? 'signin-email-error' : null"
        />
        <span *ngIf="fieldInvalid('email')" id="signin-email-error" class="auth-error-field">
          Enter a valid email address.
        </span>
      </div>

      <div class="auth-field">
        <label for="signin-password" class="auth-label">Password</label>
        <input
          id="signin-password"
          type="password"
          formControlName="password"
          class="auth-input"
          [class.invalid]="fieldInvalid('password')"
          autocomplete="current-password"
          placeholder="••••••••"
          [attr.aria-invalid]="fieldInvalid('password') || null"
          [attr.aria-describedby]="fieldInvalid('password') ? 'signin-password-error' : null"
        />
        <span *ngIf="fieldInvalid('password')" id="signin-password-error" class="auth-error-field">
          Password must be at least 8 characters.
        </span>
      </div>

      <p *ngIf="errorMessage" class="auth-error" role="alert">{{ errorMessage }}</p>

      <button type="submit" class="auth-btn" [disabled]="loading">
        <span *ngIf="!loading">Sign in</span>
        <span *ngIf="loading" class="spinner" aria-label="Signing in"></span>
      </button>

      <div class="auth-divider"><span>or</span></div>

      <button type="button" class="auth-btn-ghost" (click)="onGoogleSignIn()" [disabled]="loading">
        <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
          <path fill="#fff" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.56c2.08-1.92 3.28-4.74 3.28-8.1z"/>
          <path fill="#fff" opacity=".75" d="M12 23c2.97 0 5.46-.98 7.28-2.65l-3.56-2.77c-.99.66-2.25 1.06-3.72 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84A11 11 0 0 0 12 23z"/>
          <path fill="#fff" opacity=".5" d="M5.84 14.11A6.6 6.6 0 0 1 5.5 12c0-.74.13-1.45.34-2.11V7.05H2.18a11 11 0 0 0 0 9.9l3.66-2.84z"/>
          <path fill="#fff" opacity=".25" d="M12 5.38c1.62 0 3.07.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1A11 11 0 0 0 2.18 7.05l3.66 2.84C6.71 7.31 9.14 5.38 12 5.38z"/>
        </svg>
        Continue with Google
      </button>

      <p class="auth-footer">
        <a routerLink="/auth/forgot-password">Forgot password?</a>
      </p>
    </form>

    <p class="auth-footer">
      New here?
      <a routerLink="/auth/sign-up">Create an account</a>
    </p>
  </div>
</div>
