<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <defs>
    <linearGradient id="float-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2e2600"/>
      <stop offset="100%" stop-color="#14100a"/>
    </linearGradient>
    <linearGradient id="float-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFB800"/>
      <stop offset="100%" stop-color="#e0960a"/>
    </linearGradient>
  </defs>

  <!-- Background rounded rect -->
  <rect width="96" height="96" rx="20" fill="url(#float-bg)"/>

  <!-- Martini glass — bowl (triangle) -->
  <path d="M24 22 L72 22 L48 58 Z" fill="url(#float-gold)" opacity="0.9"/>

  <!-- Martini glass — stem -->
  <rect x="45.5" y="58" width="5" height="16" rx="2.5" fill="url(#float-gold)" opacity="0.9"/>

  <!-- Martini glass — base -->
  <rect x="35" y="72" width="26" height="5" rx="2.5" fill="url(#float-gold)" opacity="0.85"/>

  <!-- Olive on a pick (top of glass) -->
  <line x1="60" y1="22" x2="56" y2="36" stroke="#FFB800" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <circle cx="60" cy="22" r="4" fill="#2d8c2d" stroke="#FFB800" stroke-width="1" opacity="0.9"/>

  <!-- Liquid fill inside bowl (lighter gold) -->
  <path d="M30 30 L66 30 L48 56 Z" fill="#FFB800" opacity="0.18"/>

  <!-- Subtle gold glow ring -->
  <rect width="96" height="96" rx="20" fill="none" stroke="#FFB800" stroke-width="1.5" opacity="0.2"/>
</svg>
