<div class="modal-backdrop" *ngIf="isOpen" (click)="onBackdropClick()" role="dialog" aria-modal="true">
  <div class="modal-panel" [style.--agent-color]="agent!.color" (click)="$event.stopPropagation()">
    <!-- Header -->
    <div class="modal-header" [style.borderColor]="agent!.color">
      <div class="agent-avatar" [style.background]="agent!.color + '22'" [style.borderColor]="agent!.color">
        <span class="avatar-initial" [style.color]="agent!.color">
          {{ agent!.displayName.charAt(0) }}
        </span>
      </div>
      <div class="agent-info">
        <h3 class="agent-name" [style.color]="agent!.color">{{ agent!.displayName }}</h3>
        <p class="agent-role">{{ agent!.role }}</p>
      </div>
      <button class="close-btn" (click)="onBackdropClick()" aria-label="Close">✕</button>
    </div>

    <!-- Status body -->
    <div class="modal-body">
      <div class="status-row" *ngIf="agent!.currentTask">
        <span class="status-label">⚡ Current Task</span>
        <span class="status-value">{{ agent!.currentTask }}</span>
      </div>
      <div class="status-row" *ngIf="agent!.lastAction">
        <span class="status-label">🕒 Last Action</span>
        <span class="status-value">{{ agent!.lastAction }}</span>
      </div>
      <div class="status-row">
        <span class="status-label">🟢 Status</span>
        <span class="status-value status-online">Online</span>
      </div>
    </div>

    <!-- Color accent bar -->
    <div class="color-bar" [style.background]="agent!.color"></div>
  </div>
</div>
